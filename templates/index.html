<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Text Summarizer</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="background-blur blur-one"></div>
    <div class="background-blur blur-two"></div>

    <main class="container">

        <!-- ================= HEADER ================= -->

        <header class="hero">

            <div class="logo">

                <i class="fa-solid fa-wand-magic-sparkles"></i>

            </div>

            <h1>AI Text Summarizer</h1>

            <p>

                Turn long text into
                <span>3 concise bullet points</span>
                using AI.

            </p>

        </header>

        <!-- ================= INPUT CARD ================= -->

        <section class="card">

            <div class="card-header">

                <div class="title">

                    <i class="fa-regular fa-pen-to-square"></i>

                    <h2>Your Text</h2>

                </div>

                <div class="badge">

                    Max 5000 Characters

                </div>

            </div>

            <textarea

                id="inputText"

                placeholder="Paste your article, blog, document or paragraph here..."

            ></textarea>

            <div class="bottom-row">

                <div class="counter">

                    <i class="fa-regular fa-keyboard"></i>

                    <span id="charCount">

                        0 / 5000 characters

                    </span>

                </div>

                <button id="summarizeBtn">

                    <i class="fa-solid fa-wand-magic-sparkles"></i>

                    Generate Summary

                </button>

            </div>

            <div id="loading" class="loading hidden">

                <div class="spinner"></div>

                <span>Generating summary...</span>

            </div>

            <div

                id="errorBox"

                class="error hidden"

            >

            </div>

        </section>

        <!-- ================= SUMMARY CARD ================= -->

        <section

            id="resultCard"

            class="card hidden"

        >

            <div class="card-header">

                <div class="title">

                    <i class="fa-regular fa-file-lines"></i>

                    <h2>Summary</h2>

                </div>

                <div class="badge">

                    3 Bullet Points

                </div>

            </div>

            <div

                id="summaryResult"

                class="summary-box"

            >

                <div class="placeholder">

                    <i class="fa-regular fa-file-lines"></i>

                    <h3>Your summary will appear here</h3>

                    <p>

                        Paste your text above and click

                        <strong>Generate Summary</strong>

                    </p>

                </div>

            </div>

            <div class="action-buttons">

                <button

                    id="copyBtn"

                    class="secondary-btn"

                >

                    <i class="fa-regular fa-copy"></i>

                    Copy Summary

                </button>

                <button

                    id="clearBtn"

                    class="danger-btn"

                >

                    <i class="fa-regular fa-trash-can"></i>

                    Clear Text

                </button>

            </div>

        </section>

        <!-- ================= FOOTER ================= -->

        <footer>

            Built with

            <i class="fa-solid fa-heart"></i>

            using

            <strong>Flask</strong>

            &

            <strong>Groq AI</strong>

        </footer>

    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
